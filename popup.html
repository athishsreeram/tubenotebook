:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c27;
  --border: #2a2a3a;
  --accent: #7c6aff;
  --accent2: #ff6a9b;
  --green: #4fffb0;
  --text: #e8e8f0;
  --muted: #6b6b85;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 380px;
  min-height: 200px;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  overflow: hidden;
}

.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-mark {
  width: 28px;
  height: 28px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.logo-text {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 15px;
  letter-spacing: -0.3px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.badge {
  margin-left: auto;
  font-size: 9px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 20px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.page { display: none; padding: 16px 18px; }
.page.active { display: block; }

/* === NOT YOUTUBE PAGE === */
.not-yt {
  text-align: center;
  padding: 28px 18px;
}
.not-yt .icon { font-size: 36px; margin-bottom: 10px; }
.not-yt p { color: var(--muted); line-height: 1.6; }
.not-yt strong { color: var(--text); }

/* === VIDEO PAGE === */
.video-thumb {
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
}
.video-thumb img {
  width: 100%;
  display: block;
  object-fit: cover;
  max-height: 120px;
}
.video-thumb .play-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
}

.video-meta {
  margin-bottom: 14px;
}
.video-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 13px;
  line-height: 1.4;
  margin-bottom: 4px;
  color: var(--text);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.video-channel {
  color: var(--muted);
  font-size: 11px;
}

.url-row {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.url-text {
  flex: 1;
  color: var(--accent);
  font-size: 11px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.copy-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  font-size: 14px;
  padding: 2px 4px;
  border-radius: 4px;
  transition: all 0.15s;
}
.copy-btn:hover { background: var(--border); color: var(--text); }
.copy-btn.copied { color: var(--green); }

.actions { display: flex; flex-direction: column; gap: 8px; }

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 14px;
  border-radius: 7px;
  border: none;
  cursor: pointer;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.2px;
  transition: all 0.2s;
  text-decoration: none;
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), #5b4fd8);
  color: #fff;
  box-shadow: 0 4px 20px rgba(124,106,255,0.3);
}
.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(124,106,255,0.45);
}

.btn-secondary {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.btn-ghost {
  background: transparent;
  color: var(--muted);
  border: 1px dashed var(--border);
  font-family: 'DM Mono', monospace;
  font-weight: 400;
  font-size: 11px;
}
.btn-ghost:hover { color: var(--text); border-color: var(--muted); }

.divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 4px 0;
  color: var(--muted);
  font-size: 10px;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* === CHANNEL PAGE === */
.channel-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  padding: 12px;
  background: var(--surface2);
  border-radius: 8px;
  border: 1px solid var(--border);
}
.channel-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  overflow: hidden;
}
.channel-avatar img { width: 100%; height: 100%; object-fit: cover; }
.channel-name {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 14px;
}
.channel-sub { color: var(--muted); font-size: 11px; margin-top: 2px; }

.section-label {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 8px;
}

.video-list {
  max-height: 220px;
  overflow-y: auto;
  margin-bottom: 14px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.video-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s;
  border: 1px solid transparent;
}
.video-item:hover { background: var(--surface2); }
.video-item.selected {
  background: var(--surface2);
  border-color: var(--accent);
}

.video-item-check {
  width: 16px;
  height: 16px;
  border-radius: 4px;
  border: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 10px;
  transition: all 0.15s;
}
.video-item.selected .video-item-check {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

.video-item-thumb {
  width: 56px;
  height: 36px;
  border-radius: 4px;
  background: var(--border);
  flex-shrink: 0;
  overflow: hidden;
  position: relative;
}
.video-item-thumb img { width: 100%; height: 100%; object-fit: cover; }

.video-item-info { flex: 1; min-width: 0; }
.video-item-title {
  font-size: 11px;
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.video-item-meta { font-size: 10px; color: var(--muted); margin-top: 2px; }

.select-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.select-count {
  font-size: 11px;
  color: var(--muted);
}
.select-count span { color: var(--accent); font-weight: 500; }
.select-all-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--accent);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
}

.loading {
  text-align: center;
  padding: 24px;
  color: var(--muted);
}
.loading .spinner {
  width: 24px;
  height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.toast {
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--green);
  color: #000;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 12px;
  padding: 7px 16px;
  border-radius: 20px;
  opacity: 0;
  transition: all 0.25s;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.tab-row {
  display: flex;
  gap: 4px;
  margin-bottom: 14px;
  background: var(--surface2);
  border-radius: 7px;
  padding: 3px;
}
.tab {
  flex: 1;
  padding: 6px;
  text-align: center;
  border-radius: 5px;
  cursor: pointer;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 11px;
  color: var(--muted);
  transition: all 0.15s;
  border: none;
  background: none;
}
.tab.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}

<div class="header">
  <div class="logo-mark">📓</div>
  <span class="logo-text">TubeNotebook</span>
  <span class="badge">v1.0</span>
</div>

<!-- NOT YOUTUBE -->

<div class="page active" id="page-not-yt">
  <div class="not-yt">
    <div class="icon">🎬</div>
    <p>Navigate to a <strong>YouTube video</strong> or <strong>channel page</strong> to get started.</p>
  </div>
</div>

<!-- VIDEO PAGE -->

<div class="page" id="page-video">
  <div class="video-thumb">
    <img id="vid-thumb" src="" alt="" />
    <div class="play-overlay">▶</div>
  </div>
  <div class="video-meta">
    <div class="video-title" id="vid-title">Loading...</div>
    <div class="video-channel" id="vid-channel"></div>
  </div>
  <div class="url-row">
    <span class="url-text" id="vid-url"></span>
    <button class="copy-btn" id="copy-url-btn" title="Copy URL">📋</button>
  </div>
  <div class="actions">
    <button class="btn btn-primary" id="open-notebook-btn">
      📓 Open in NotebookLM
    </button>
    <div class="divider">or</div>
    <button class="btn btn-ghost" id="copy-prompt-btn">
      ✦ Copy NotebookLM import prompt
    </button>
  </div>
</div>

<!-- CHANNEL PAGE -->

<div class="page" id="page-channel">
  <div class="channel-header">
    <div class="channel-avatar" id="ch-avatar">📺</div>
    <div>
      <div class="channel-name" id="ch-name">Channel</div>
      <div class="channel-sub" id="ch-sub">Fetching videos...</div>
    </div>
  </div>

  <div class="section-label">Recent Videos</div>
  <div class="select-bar">
    <span class="select-count"><span id="sel-count">0</span> selected</span>
    <button class="select-all-btn" id="select-all-btn">Select all</button>
  </div>

  <div class="video-list" id="video-list">
    <div class="loading">
      <div class="spinner"></div>
      <div>Scanning channel...</div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="batch-notebook-btn">
      📓 Send Selected to NotebookLM
    </button>
    <button class="btn btn-ghost" id="batch-copy-btn">
      📋 Copy Selected URLs
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="popup.js"></script>

</body>
